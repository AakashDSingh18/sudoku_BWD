<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sudoku Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>SUDOKU</h1>
    <p class="subtitle">Welcome to the Sudoku Game<br>I hope you'll enjoy it<br>Press <b>PLAY to Start</b></p>

    <div class="mistakes" id="mistake-total">Mistakes: 0</div>

    <button class="btn-play" onclick="play()">Play</button>
    
    <div id="message"></div>
    <div class="board-wrapper">
        
        <div id="sudoku-board"></div>

        <div class="numpad" id="numpad">
            <div class="row">
                <button onclick="inputNum(1)">1</button>
                <button onclick="inputNum(2)">2</button>
                <button onclick="inputNum(3)">3</button>
                <button onclick="inputNum(4)">4</button>
                <button onclick="inputNum(5)">5</button>
            </div>
            <div class="row">
                <button onclick="inputNum(6)">6</button>
                <button onclick="inputNum(7)">7</button>
                <button onclick="inputNum(8)">8</button>
                <button onclick="inputNum(9)">9</button>
                <button class="erase-btn" onclick="eraseCell()">Erase</button>
            </div>
        </div>

        <div class="actions">
            <button class="btn-new" onclick="newGame()">New Game</button>
            <button class="btn-check" onclick="checkWin()">Check</button>
        </div>
    </div>
</body>
<script src="script.js" defer></script>
</html>
